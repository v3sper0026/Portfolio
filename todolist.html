<!DOCTYPE html>
<html>
<head>
    <title>To-do List</title>

    <style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    margin-top: 80px;
}

.container {
    width: 350px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #45a049;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

.delete-btn {
    background: red;
    border-radius: 5px;
}

.delete-btn:hover {
    background: darkred;
}

.completed {
    text-decoration: line-through;
    color: gray;
}
    </style>
</head>

<body>

<div class="container">

    <h2>My To-do List</h2>

    <div class="input-group">
        <input id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

</div>

<script>

function saveTasks() {
    let tasks = [];
    document.querySelectorAll("li").forEach(li => {
        tasks.push({
            text: li.dataset.text,
            completed: li.classList.contains("completed")
        });
    });
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function createTaskElement(text, completed = false) {
    let li = document.createElement("li");
    li.dataset.text = text;
    li.innerHTML = "📝 " + text + ' <button class="delete-btn">❌</button>';
    if (completed) li.classList.add("completed");

    li.onclick = function() {
        li.classList.toggle("completed");
        saveTasks();
    };

    li.querySelector(".delete-btn").onclick = function(event) {
        event.stopPropagation();
        li.remove();
        saveTasks();
    };

    return li;
}

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value.trim();

    if (task === "") return;

    let li = createTaskElement(task, false);
    document.getElementById("taskList").appendChild(li);
    input.value = "";
    saveTasks();
}

function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.forEach(task => {
        let li = createTaskElement(task.text, task.completed);
        document.getElementById("taskList").appendChild(li);
    });
}

loadTasks();

document.getElementById("taskInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        addTask();
    }
});

</script>

</body>
</html>
