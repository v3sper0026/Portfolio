<!DOCTYPE html>
<html>
<head>
    <title>My To-do List</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff0f5 0%, #f0f8ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
}

.container {
    width: 420px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(255,107,157,0.15);
}

h2 {
    text-align: center;
    color: #ff6b9d;
    font-size: 26px;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 12px 15px;
    border: 2px solid #ffd6e8;
    border-radius: 30px;
    font-size: 14px;
    outline: none;
    color: #5a5a5a;
    transition: 0.3s;
}

input:focus {
    border-color: #ff6b9d;
}

input::placeholder {
    color: #ffadd0;
}

button {
    padding: 12px 20px;
    background: linear-gradient(135deg, #ff6b9d, #74b9ff);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
    transform: translateY(-2px);
}

ul {
    list-style: none;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    margin-bottom: 10px;
    background: #fff8fb;
    border: 1.5px solid #ffd6e8;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    color: #5a5a5a;
    font-size: 14px;
}

li:hover {
    border-color: #ff6b9d;
    box-shadow: 0 4px 12px rgba(255,107,157,0.15);
}

.delete-btn {
    background: transparent;
    color: #ffadd0;
    border: none;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.delete-btn:hover {
    background: #fff0f5;
    color: #ff6b9d;
    transform: none;
    opacity: 1;
}

.completed {
    text-decoration: line-through;
    color: #ffadd0;
    background: #fff5f9;
}

.empty-msg {
    text-align: center;
    color: #ffadd0;
    font-size: 14px;
    padding: 20px 0;
}

footer {
    margin-top: auto;
    padding: 25px;
    text-align: center;
    color: #ffadd0;
    font-size: 13px;
}

footer span {
    color: #ff6b9d;
}
    </style>
</head>

<body>

<div class="container">
    <h2>🌸 My To-do List</h2>

    <div class="input-group">
        <input id="taskInput" placeholder="Add a new task...">
        <button onclick="addTask()">+ Add</button>
    </div>

    <ul id="taskList"></ul>
    <p class="empty-msg" id="emptyMsg">No tasks yet. Add one above! 🌷</p>
</div>

<footer>
    <p>© 2025 <span>Vesper</span>. All rights reserved.</p>
</footer>

<script>
function saveTasks() {
    let tasks = [];
    document.querySelectorAll("li").forEach(li => {
        tasks.push({
            text: li.dataset.text,
            completed: li.classList.contains("completed")
        });
    });
    localStorage.setItem("tasks", JSON.stringify(tasks));
    updateEmptyMsg();
}

function updateEmptyMsg() {
    let taskList = document.getElementById("taskList");
    let emptyMsg = document.getElementById("emptyMsg");
    emptyMsg.style.display = taskList.children.length === 0 ? "block" : "none";
}

function createTaskElement(text, completed = false) {
    let li = document.createElement("li");
    li.dataset.text = text;
    li.innerHTML = "🌸 " + text + ' <button class="delete-btn">❌</button>';
    if (completed) li.classList.add("completed");

    li.onclick = function() {
        li.classList.toggle("completed");
        saveTasks();
    };

    li.querySelector(".delete-btn").onclick = function(event) {
        event.stopPropagation();
        li.remove();
        saveTasks();
    };

    return li;
}

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value.trim();
    if (task === "") return;

    let li = createTaskElement(task, false);
    document.getElementById("taskList").appendChild(li);
    input.value = "";
    saveTasks();
}

function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.forEach(task => {
        let li = createTaskElement(task.text, task.completed);
        document.getElementById("taskList").appendChild(li);
    });
    updateEmptyMsg();
}

loadTasks();

document.getElementById("taskInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        addTask();
    }
});
</script>

</body>
</html>
